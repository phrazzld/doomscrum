# DoomScrum's dogfood configuration. `doomscrum init` writes portable defaults;
# this checkout intentionally reads its own open GitHub issues.

# Active render profile (see [profiles.*] at the bottom). "dev" keeps all
# local iteration FREE (fake provider); switch to "content" — or run with
# `--profile content` — only when actually iterating on generated media.
profile = "dev"

[repo]
# The repository DoomScrum is synced to. Backlog specs are read from
# `<path>/<backlog_dir>` (source = "markdown"), or from open GitHub issues
# via `gh issue list` (source = "github-issues"). Agent worktrees are created
# from this repo.
path = "."
source = "github-issues" # "markdown" | "github-issues"
backlog_dir = "backlog.d"
state_dir = ".doomscrum"

[feed]
# Only the top N specs (filename order = priority) enter the feed.
max_items = 10
# Just-in-time rendering (docs/EFFICIENCY.md strategy 1): serving the feed
# renders at most this many specs ahead of the viewport cursor. Specs deeper
# in the feed cost nothing until you scroll toward them; an exhausted wallet
# degrades to a free local preview instead of failing the feed. 0 disables JIT.
prefetch_depth = 3

[video]
# "fake" renders a deterministic spec-branded preview locally with ffmpeg
# (offline and free; a clearly badged embedded fallback remains playable).
# "fal" generates real AI video — costs money and sends spec-derived
# prompts to fal.ai. Needs FAL_API_KEY (env or ~/.secrets).
provider = "fake"
# Supported (all native-audio, 720p, prices verified 2026-06-10; sora-2
# re-checked 2026-07-15):
#   fal-ai/veo3.1/lite                           $0.05/s  (durations 4/6/8)
#   fal-ai/kling-video/v2.6/pro/text-to-video    $0.14/s  (durations 5/10)
#   fal-ai/veo3.1/fast                           $0.15/s  (durations 4/6/8)
#   bytedance/seedance-2.0/fast/text-to-video    $0.2419/s (durations 4-15)
# fal-ai/sora-2/text-to-video is DEPRECATED on fal (verified 2026-07-15:
# model page banner "This endpoint is deprecated / no longer supported")
# and was removed from the default model and the mix below. veo3.1/lite
# carries the cheap weight; seedance fast stays the hero tier ($2.90).
# fal_model/max_duration_sec apply when the mix below is empty or when
# --model forces a single pipeline.
fal_model = "fal-ai/veo3.1/lite"
max_duration_sec = 8
# Fallback $/s for models not in the built-in price table; known models
# use their verified price automatically.
price_per_second_usd = 0.15
# Wallet guard: refuse real renders once durable spend would exceed this.
# Keep the repository config at the coded public default; raise deliberately
# for a bounded content batch, then lower it again.
max_total_spend_usd = 25.0

# Render portfolio (see docs/EFFICIENCY.md): each spec deterministically
# draws one pipeline by content hash. Weighted toward cheap/short clips
# with a hero sprinkle — average ≈ $0.43/clip (was $0.94 with sora-2,
# removed 2026-07-15: endpoint deprecated on fal; stills wired 2026-07-15).
# NOTE: these [[video.mix]] tables must stay AFTER the plain [video] keys.
# ltx-2.3 was VERIFIED BAD 2026-06-11 and removed: transcript gate caught
# catastrophic diction ("no vibes merges, capiche" -> "No merges. Copy,
# sheep."), one cutoff, plus two 422s and a queue timeout in one batch.
[[video.mix]]
model = "stills/ken-burns" # ~$0.03/clip: AI keyframe + Ken Burns + TTS + captions
duration_sec = 8           # any duration; ffmpeg composes exactly
weight = 6

[[video.mix]]
model = "fal-ai/veo3.1/lite" # $0.05/s @720p, native audio, reliable diction
duration_sec = 8             # $0.40/clip
weight = 3

[[video.mix]]
model = "bytedance/seedance-2.0/fast/text-to-video" # $0.2419/s showpiece
duration_sec = 12                                   # $2.90/clip
weight = 1

# Stills pipeline (~$0.03/clip): one AI keyframe + local Ken Burns motion +
# deterministic TTS narration + estimated word-synced captions. The heavy
# weight in the mix above. Override any field; defaults are shown.
# [video.stills]
# image_model = "fal-ai/bytedance/seedream/v4/text-to-image"
# image_price_usd = 0.03
# tts_cmd = ["say", "-o", "{out}", "{text}"]  # macOS default; empty = silent


[script]
# Scripts are LLM-written from the FULL raw spec (any format, any repo) —
# the deterministic template planner is only the offline fallback for the
# fake provider. ~$0.0008/script, cached by spec hash in .doomscrum/scripts.
# Preview before paying for video: `doomscrum script <title-substring>`.
mode = "llm"                       # "llm" | "templates"
# Affordable-model pick 2026-07-16 (docs/bench/): Gemini 3.1 Flash Lite —
# only finalist with all twelve Crucible contract checks green, and top-2
# judged (7.50/10; energy 9.0, speakability 9.1 under the corrected
# scene-carries-the-joke rubric; the gap to qwen3.5-flash is inside noise).
# ~$0.0008/script at representative usage: one-third of gpt-5.4-mini and
# roughly one-thirty-eighth of claude-fable-5. Dev profile never pays.
model = "google/gemini-3.1-flash-lite"  # via OpenRouter
# Public OpenRouter endpoint. Set OPENROUTER_API_KEY in the environment or
# ~/.secrets. Fleet-specific brokers belong in a separate runtime config,
# never in this committed dogfood config.
base_url = "https://openrouter.ai/api/v1"

# ---- Render profiles -------------------------------------------------
# Partial [video] overrides; unset fields keep the base values above.
# dev: free local previews — the everyday default for working on DoomScrum
# itself. The stills pipeline (~$0.03/clip, needs FAL_API_KEY + ffmpeg) is in
# the content mix above; dev never spends or egresses spec text.
[profiles.dev]
provider = "fake"
mix = []

# content: the real weighted render portfolio (avg ≈ $0.43/clip).
# Use via `doomscrum generate --profile content --provider fal` or by
# flipping the `profile` key while iterating on brainrot quality.
[profiles.content]
provider = "fal"

[agent]
# Right swipe runs implement_cmd in a fresh worktree. Left swipe only skips;
# shape_cmd is available through the explicit backend/control action.
# Placeholders: {worktree} {prompt} {branch} {spec_path} {title} {model}.
# Default: the opencode CLI on OpenRouter. Run `opencode auth login` once to store
# your OpenRouter key. Swap the model on the next line; swap the agent here.
agent_model = "openrouter/z-ai/glm-5.2"
implement_cmd = ["opencode", "run", "--dir", "{worktree}", "-m", "{model}", "{prompt}"]
shape_cmd = ["opencode", "run", "--dir", "{worktree}", "-m", "{model}", "{prompt}"]
# After the agent commits, DoomScrum pushes the branch and runs pr_cmd.
# Placeholders: {branch} {title} {body_file} {worktree}.
pr_cmd = ["gh", "pr", "create", "--head", "{branch}", "--title", "{title}", "--body-file", "{body_file}"]
open_pr = true
# Mis-swipe undo: a swipe sits queued and cancellable for this many seconds
# before the agent starts. Cancelling within the window leaves zero git
# side-effects (no worktree, branch, or PR). 0 disables the window.
undo_window_sec = 5
# The agent stage runs untrusted spec content (specs can come from a foreign
# repo), so its process env is built from this allowlist alone — never the
# parent env. The default is PATH/HOME/locale/XDG only: NO API keys, because the
# agent's output is committed and pushed, so any key in its env can be leaked
# into a PR. The default opencode agent authenticates from its own credential
# file (~/.local/share/opencode/auth.json via `opencode auth login`, reached
# through HOME), so it needs no key in env. DoomScrum's own keys (FAL_API_KEY/
# OPENROUTER_API_KEY) and git tokens are dropped even if listed. Add a var only if
# your agent authenticates via an env var — and know it is then exposed to
# untrusted spec execution.
# env_allowlist = ["PATH", "HOME", "USER", "SHELL", "TERM", "TMPDIR", "LANG", "OPENAI_API_KEY"]
