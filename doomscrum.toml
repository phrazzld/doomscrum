# DoomScrum configuration. Every field is optional; these are the defaults.

# Active render profile (see [profiles.*] at the bottom). "dev" keeps all
# local iteration FREE (fake provider); switch to "content" — or run with
# `--profile content` — only when actually iterating on generated media.
profile = "dev"

[repo]
# The repository DoomScrum is synced to. Backlog specs are read from
# `<path>/<backlog_dir>`, and agent worktrees are created from this repo.
path = "."
backlog_dir = "backlog.d"
state_dir = ".doomscrum"

[feed]
# Only the top N specs (filename order = priority) enter the feed.
max_items = 10

[video]
# "fake" renders an embedded fixture (offline, free).
# "fal" generates real AI video — costs money and sends spec-derived
# prompts to fal.ai. Needs FAL_API_KEY (env or ~/.secrets).
provider = "fake"
# Supported (all native-audio, 720p, prices verified 2026-06-10):
#   fal-ai/veo3.1/lite                           $0.05/s  (durations 4/6/8)
#   fal-ai/sora-2/text-to-video                  $0.10/s  (durations 4/8/12)
#   fal-ai/kling-video/v2.6/pro/text-to-video    $0.14/s  (durations 5/10)
#   fal-ai/veo3.1/fast                           $0.15/s  (durations 4/6/8)
#   bytedance/seedance-2.0/fast/text-to-video    $0.2419/s (durations 4-15)
# Default (bake-off 2026-06-10, hypermaximalist prompts): sora-2 at 12s
# ($1.20/clip) — speaks title + goal + "Not done until <criterion>",
# renders correctly-spelled word-synced captions, and delivers the
# infomercial energy. seedance fast remains the premium tier ($2.90);
# veo3.1/lite the budget tier ($0.40, 8s, captions garble, no criterion).
# fal_model/max_duration_sec apply when the mix below is empty or when
# --model forces a single pipeline.
fal_model = "fal-ai/sora-2/text-to-video"
max_duration_sec = 12
# Fallback $/s for models not in the built-in price table; known models
# use their verified price automatically.
price_per_second_usd = 0.15
# Wallet guard: real renders refused once estimated total spend would
# exceed this. Raise deliberately. (25 -> 40 for the seedance hero
# re-render; 40 -> 60 on 2026-06-10 for the hypermaximalist regen;
# 60 -> 70 on 2026-06-11 for the demo-readiness batch: full feed on the
# render mix with LLM scripts, ~$7.7 planned + re-roll headroom.)
max_total_spend_usd = 70.0

# Render portfolio (see docs/EFFICIENCY.md): each spec deterministically
# draws one pipeline by content hash. Weighted toward cheap/short clips
# with a hero sprinkle — average ≈ $0.94/clip vs $1.20 flat sora.
# NOTE: these [[video.mix]] tables must stay AFTER the plain [video] keys.
# ltx-2.3 was VERIFIED BAD 2026-06-11 and removed: transcript gate caught
# catastrophic diction ("no vibes merges, capiche" -> "No merges. Copy,
# sheep."), one cutoff, plus two 422s and a queue timeout in one batch.
[[video.mix]]
model = "fal-ai/veo3.1/lite" # $0.05/s @720p, native audio, reliable diction
duration_sec = 8             # $0.40/clip
weight = 5

[[video.mix]]
model = "fal-ai/sora-2/text-to-video" # $0.10/s, speaks the criterion at 12s
duration_sec = 12                     # $1.20/clip
weight = 3

[[video.mix]]
model = "bytedance/seedance-2.0/fast/text-to-video" # $0.2419/s showpiece
duration_sec = 12                                   # $2.90/clip
weight = 1

[script]
# Scripts are LLM-written from the FULL raw spec (any format, any repo) —
# the deterministic template planner is only the offline fallback for the
# fake provider. ~$0.002/script, cached by spec hash in .doomscrum/scripts.
# Preview before paying for video: `doomscrum script <title-substring>`.
mode = "llm"                       # "llm" | "templates"
# Bench winner 2026-06-11 (docs/bench/): persona-first prompt, mean 8.75/10
# across 4 specs x 2 frontier judges. Budget runner-up: moonshotai/kimi-k2.5.
model = "openai/gpt-5.4-mini"      # via OpenRouter, ~$0.004/script
base_url = "https://openrouter.ai/api/v1"

# ---- Render profiles -------------------------------------------------
# Partial [video] overrides; unset fields keep the base values above.
# dev: free offline fixtures — the everyday default for working on the
# app itself. Once the stills pipeline (backlog 026) ships, dev should
# point at it (~$0.05/clip bespoke) instead of the fixture.
[profiles.dev]
provider = "fake"
mix = []

# content: the real weighted render portfolio (avg ≈ $0.77/clip).
# Use via `doomscrum generate --profile content --provider fal` or by
# flipping the `profile` key while iterating on brainrot quality.
[profiles.content]
provider = "fal"

[agent]
# Right swipe runs implement_cmd in a fresh worktree; left swipe runs
# shape_cmd. Placeholders: {worktree} {prompt} {branch} {spec_path} {title}.
implement_cmd = ["codex", "exec", "--cd", "{worktree}", "--sandbox", "workspace-write", "{prompt}"]
shape_cmd = ["codex", "exec", "--cd", "{worktree}", "--sandbox", "workspace-write", "{prompt}"]
# After the agent commits, DoomScrum pushes the branch and runs pr_cmd.
# Placeholders: {branch} {title} {body_file} {worktree}.
pr_cmd = ["gh", "pr", "create", "--head", "{branch}", "--title", "{title}", "--body-file", "{body_file}"]
open_pr = true
