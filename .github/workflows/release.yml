name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            asset_name: doomscrum-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: doomscrum-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: doomscrum-release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          bin=target/${{ matrix.target }}/release/doomscrum
          staging=${{ matrix.asset_name }}
          mkdir -p "$staging"
          cp "$bin" "$staging/doomscrum"
          cp README.md LICENSE "$staging/"
          tar czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combined checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/SHA256SUMS
          generate_release_notes: true

      - name: Update Homebrew tap formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          arm64_sha=$(awk '{print $1}' dist/doomscrum-macos-arm64.tar.gz.sha256)
          linux_sha=$(awk '{print $1}' dist/doomscrum-linux-x86_64.tar.gz.sha256)
          repo_url="https://github.com/${GITHUB_REPOSITORY}"

          # This repo is private, so a plain browser download URL 404s for
          # an unauthenticated `curl` (which is what a stock Homebrew `url`
          # stanza does). Resolve each asset's numeric id and point the
          # formula at the authenticated REST API download endpoint
          # instead, via a custom download strategy that adds the bearer
          # token from HOMEBREW_GITHUB_API_TOKEN. If/when this repo goes
          # public, drop the custom strategy and use the plain release URL.
          arm64_asset_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            --jq '.assets[] | select(.name == "doomscrum-macos-arm64.tar.gz") | .id')
          linux_asset_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            --jq '.assets[] | select(.name == "doomscrum-linux-x86_64.tar.gz") | .id')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/phrazzld/homebrew-doomscrum.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/doomscrum.rb <<EOF
          require "download_strategy"

          # doomscrum's source repo is private (docs/adoption/2026-07-07-installable-releases/);
          # authenticate release-asset downloads with HOMEBREW_GITHUB_API_TOKEN.
          class DoomscrumPrivateReleaseDownloadStrategy < CurlDownloadStrategy
            def _fetch(url:, resolved_url:, timeout:)
              token = Homebrew::EnvConfig.github_api_token
              raise CurlDownloadStrategyError, "Set HOMEBREW_GITHUB_API_TOKEN (repo-scoped PAT) to install from this private-repo tap." if token.blank?

              ohai "Downloading #{url}" if \$stdout.tty?
              curl_download resolved_url, to: temporary_path, timeout: timeout,
                             headers: ["Authorization: token #{token}", "Accept: application/octet-stream"]
            end
          end

          class Doomscrum < Formula
            desc "PRD brainrot triage: backlog specs as swipeable shortform video"
            homepage "${repo_url}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${arm64_asset_id}",
                    using: DoomscrumPrivateReleaseDownloadStrategy
                sha256 "${arm64_sha}"
              end
            end

            on_linux do
              on_intel do
                url "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${linux_asset_id}",
                    using: DoomscrumPrivateReleaseDownloadStrategy
                sha256 "${linux_sha}"
              end
            end

            def install
              bin.install "doomscrum"
            end

            test do
              system "#{bin}/doomscrum", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "doomscrum-release-bot"
          git config user.email "doomscrum-release-bot@users.noreply.github.com"
          git add Formula/doomscrum.rb
          if ! git diff --cached --quiet; then
            git commit -m "doomscrum ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
